name: Afternoon scrape + summary

on:
  schedule:
    # DOČASNĚ každou hodinu pro ověření že GH Actions cron nativně spouští
    # workflow. Po ověření vrátit zpět na:
    #   - cron: '0 11 * * *'  # léto (CEST) → 13:00 Praha
    #   - cron: '0 12 * * *'  # zima (CET)  → 13:00 Praha
    # + gate job na Prague hour == 13.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape + daily summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PROXY_URL: ${{ secrets.PROXY_URL }}
      APP_ENV: 'production'
      SCRAPE_CONCURRENCY: '3'
      LOG_LEVEL: 'info'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Apply DB migrations (idempotent)
        run: npm run db:migrate

      - name: Scrape + afternoon Discord notification
        run: npm run scrape -- --notify=afternoon

      - name: Build daily summary + Discord summary notification
        run: npm run summary -- --notify=afternoon
