name: Afternoon scrape + summary

on:
  schedule:
    # Oba cronu běží každý den; gate job rozhodne podle Europe/Prague hodiny
    # zda se má scrape spustit. Pokrývá DST přechod bez ruční úpravy.
    - cron: '0 11 * * *'  # léto (CEST, UTC+2) → 13:00 Praha
    - cron: '0 12 * * *'  # zima (CET,  UTC+1) → 13:00 Praha
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  gate:
    name: Check Prague hour == 13
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        run: |
          H=$(TZ=Europe/Prague date +%H)
          echo "Prague hour=$H"
          if [ "$H" = "13" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  scrape:
    name: Scrape + daily summary
    needs: gate
    if: needs.gate.outputs.go == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PROXY_URL: ${{ secrets.PROXY_URL }}
      APP_ENV: 'production'
      SCRAPE_CONCURRENCY: '3'
      LOG_LEVEL: 'info'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Apply DB migrations (idempotent)
        run: npm run db:migrate

      - name: Scrape + afternoon Discord notification
        run: npm run scrape -- --notify=afternoon

      - name: Build daily summary + Discord summary notification
        run: npm run summary -- --notify=afternoon
